# Example workflow: run the C/C++ vulnerability scan and publish SARIF to the
# repository's "Code scanning" tab. Parked here (the push token lacks the
# 'workflow' scope); move to .github/workflows/code-scan.yml to activate.
#
# In another repository, replace `uses: ./` with:
#   uses: axist-infinit/c-code-review-llm@main
name: Code Scan

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  security-events: write   # required for upload-sarif
  pull-requests: write     # required for inline PR review comments

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: C/C++ vulnerability scan
        id: scan
        uses: ./            # this repo provides the composite action (action.yml)
        with:
          source: "."
          output: "c-code-review.sarif"
          only-vulnerable: "true"
          # Post inline review comments on pull requests (skips on push).
          annotate: "true"
          github-token: ${{ github.token }}

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-file }}
