name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Intentionally do NOT install torch/transformers: the unit-tested
      # helpers must stay importable (and the tests must pass) without the
      # heavy ML stack. tree-sitter is lightweight (no torch) and lets the
      # tree-sitter extraction tests run for real instead of skipping.
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest tree_sitter tree_sitter_c

      - name: py_compile all Python files
        run: |
          set -e
          find . -name '*.py' -not -path './.git/*' -print0 \
            | xargs -0 -n1 python -m py_compile

      - name: bash -n all shell scripts
        run: |
          set -e
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 -n1 bash -n

      - name: Run unit tests (offline, no torch)
        run: python -m pytest tests/ -q
