name: "C/C++ Vulnerability Scan (SARIF)"
description: >-
  Model-free C/C++ security scan (tree-sitter + unsafe-API/CWE heuristics) that
  emits SARIF for GitHub code scanning. No model, GPU, or network required.
author: "C-Code-Review-LLM"
branding:
  icon: "shield"
  color: "red"

inputs:
  source:
    description: "File or directory to scan"
    required: false
    default: "."
  output:
    description: "SARIF output file path"
    required: false
    default: "c-code-review.sarif"
  lang:
    description: "tree-sitter grammar: auto (per extension), c, or cpp"
    required: false
    default: "auto"
  only-vulnerable:
    description: "Only include findings judged vulnerable in the SARIF"
    required: false
    default: "true"

outputs:
  sarif-file:
    description: "Path to the generated SARIF file"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Install scan dependencies (tree-sitter; no torch)
      shell: bash
      run: python -m pip install --quiet tree_sitter tree_sitter_c tree_sitter_cpp

    - name: Run scan -> explain -> SARIF
      shell: bash
      env:
        CCR_PROFILE: cpu
        A: ${{ github.action_path }}
        SRC: ${{ inputs.source }}
        LANG_INPUT: ${{ inputs.lang }}
        OUT: ${{ inputs.output }}
        ONLY_VULN: ${{ inputs.only-vulnerable }}
      run: |
        set -euo pipefail
        work="${RUNNER_TEMP:-/tmp}/ccr-scan"
        python "$A/heuristic_scan.py" "$SRC" -o "$work" --lang "$LANG_INPUT"
        python "$A/llm_explain.py" "$work/classifier_findings.json" \
          --out "$work/llm_findings.json" --backend heuristic
        only=""
        [ "$ONLY_VULN" = "true" ] && only="--only-vulnerable"
        python "$A/to_sarif.py" "$work/llm_findings.json" -o "$OUT" $only
